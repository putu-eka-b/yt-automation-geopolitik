name: Robot Bodet News
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setting Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Library
        run: |
          pip install google-generativeai edge-tts

      - name: Jalankan Robot Riset
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Munculkan Tombol Download
        uses: actions/upload-artifact@v4
        with:
          name: Hasil-Riset-Bodet-News
          path: |
            naskah_berita.txt
            audio_berita.mp3

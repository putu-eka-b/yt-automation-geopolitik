name: Robot Bodet News
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install google-generativeai edge-tts
      - name: Jalankan Skrip
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
      - name: Upload Hasil Bodet News
        uses: actions/upload-artifact@v4
        with:
          name: Konten-Siap-Pakai
          path: |
            naskah_berita.txt
            audio_berita.mp3

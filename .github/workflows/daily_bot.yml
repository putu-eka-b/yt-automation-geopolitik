name: Robot Bodet News
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setting Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Library
        run: pip install google-generativeai edge-tts

      - name: Jalankan Robot
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Cek Lokasi File
        run: ls -R

      - name: Upload Hasil Bodet News
        uses: actions/upload-artifact@v4
        with:
          name: Konten-Bodet-News
          path: |
            **/*.txt
            **/*.mp3
          if-no-files-found: warn
